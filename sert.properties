########################################################################
# SERT Properties File
########################################################################
sert_apex_workspace = sert
# keep sert_apex_workspace_id blank to auto-allocate ID
sert_apex_workspace_id = 32049826282261068
sert_admin_user = sert_admin
# set sert_app_id to empty value to auto-allocate Application ID
# eg:
# sert_app_id =
#
sert_app_id = 2100
# set sert_admin_id to empty value to auto-allocate Application ID
# eg:
# sert_admin_id =
sert_admin_id = 2101
# leave sert_aop_url blank to diable AOP
sert_aop_url =
# ensure you set a valid admin email address
sert_admin_email_address = you@domain.org
# set the default FROM address for generated emails
sert_email_from = noreply@domain.org
sert_mode = standalone

# if you leave the tablespace properties BLANK, installer will attempt to identify default tablespaces
# this is fine for ADB and some PDBs that are well configured, but for deployment one should
# explicitly define the tablespaces you install into. This only have effect on first install
sert_data_tablespace =
sert_temp_tablespace =
# ======================================================================
# SERT Guardian Properties
# ======================================================================

# Conditional context to install guardian
# Must be set to "runtime" to install guardian or "none"
# e.g.
# guardian_switch = none
guardian_switch = runtime

# Set sert_guardian_app_id to empty value to auto-allocate Application ID
# e.g.
# sert_guardian_app_id =
sert_guardian_app_id = 2102

# Set the Authentication Scheme from the included options:
#   "Builder Extension Sign-In" - enables you to integrate this application with the APEX development environment.
#   "SAML Sign-In"              - supports authentication with SAML2 identity providers
#   "Oracle APEX Accounts"      - internal user accounts that are managed in the Oracle APEX user repository.
# e.g.
# guardian_authn_scheme = Builder Extension Sign-In

# ======================================================================
# SERT Builder Extension Grant Job
# ======================================================================

# Set builder_extension_job to "active" to create a scheduled job at
# install time that runs to grant APEX builder extension workspace
# access from all workspaces to the SERT workspace.
# Requires the installing schema to have APEX instance administrator privileges.
# Valid values: active, none (or absent)
# Default: active
builder_extension_job = active

# Job execution frequency: [MINUTELY|HOURLY|DAILY]
# Case-insensitive. Invalid values silently fall back to MINUTELY.
# Default: MINUTELY
builder_extension_job_frequency = MINUTELY

# Job execution interval within the frequency unit [1..99]
# Defaults: 10 for MINUTELY, 1 for HOURLY, 1 for DAILY
# Invalid values silently fall back to the default for the frequency.
builder_extension_job_interval = 10